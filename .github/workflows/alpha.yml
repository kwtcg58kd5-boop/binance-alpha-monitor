name: Binance Alpha Monitor


on:

  schedule:

    - cron: "*/5 * * * *"


  workflow_dispatch:



jobs:


  monitor:


    runs-on: ubuntu-latest



    steps:


    - name: Checkout

      uses: actions/checkout@v4



    - name: Setup Python

      uses: actions/setup-python@v5

      with:

        python-version: "3.11"



    - name: Install

      run:

        pip install requests beautifulsoup4



    - name: Run

      env:

        SERVER_KEY: ${{ secrets.SERVER_KEY }}

      run:

        python monitor.py
